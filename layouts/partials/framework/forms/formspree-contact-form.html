<form id="fs-frm" name="simple-contact-form" accept-charset="utf-8" action="{{ .Site.Params.contact_form.formspree_endpoint }}" method="post">
  <fieldset id="fs-frm-inputs">
    <label for="full-name">Full Name</label>
    <input type="text" name="name" id="full-name" placeholder="First and Last" required="">
    <label for="email-address">Email Address</label>
    <input type="email" name="_replyto" id="email-address" placeholder="email@domain.tld" required="">
    <label for="message">Message</label>
    <textarea rows="5" name="message" id="message" placeholder="Aenean lacinia bibendum nulla sed consectetur. Vivamus sagittis lacus vel augue laoreet rutrum faucibus dolor auctor. Donec ullamcorper nulla non metus auctor fringilla nullam quis risus." required=""></textarea>
    <input type="hidden" name="_subject" id="email-subject" value="Contact Form Submission">
  </fieldset>
  <div class="fs-frm-actions">
    <input type="submit" class="button" value="{{ .Params.contact.button_text | default "Submit" }}">
    <p id="fs-frm-status" class="fs-frm-status" aria-live="polite"></p>
  </div>
</form>
<script>
  (function () {
    const form = document.getElementById('fs-frm');
    if (!form) return;

    const status = document.getElementById('fs-frm-status');
    const submit = form.querySelector('input[type="submit"]');

    form.addEventListener('submit', async function (event) {
      event.preventDefault();

      if (!submit) return;

      submit.disabled = true;
      submit.value = 'Sending...';
      status.textContent = '';
      status.className = 'fs-frm-status';

      try {
        const response = await fetch(form.action, {
          method: 'POST',
          body: new FormData(form),
          headers: {
            Accept: 'application/json'
          }
        });

        if (!response.ok) {
          throw new Error('Submission failed');
        }

        form.reset();
        status.textContent = 'Thanks. Your message was sent successfully.';
        status.className = 'fs-frm-status fs-frm-status-success';
      } catch (error) {
        status.textContent = 'Something went wrong. Please try again.';
        status.className = 'fs-frm-status fs-frm-status-error';
      } finally {
        submit.disabled = false;
        submit.value = '{{ .Params.contact.button_text | default "Submit" }}';
      }
    });
  })();
</script>
